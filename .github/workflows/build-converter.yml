name: Build Music Converter

on:
  push:
    tags:
      - 'converter-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: |
          pyinstaller --onefile --noconsole --name "Serenade Music Converter" --add-data "tools/serenade-icon.png;." --hidden-import numpy --hidden-import pygame --hidden-import mido --collect-submodules PyQt6 tools/midi2ahk.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Serenade-Music-Converter-Windows
          path: dist/Serenade Music Converter.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/converter-v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.ref_name }} "dist/Serenade Music Converter.exe" --repo ${{ github.repository }} --clobber
