name: Build Music Converter

on:
  push:
    paths:
      - 'tools/midi2ahk.py'
      - 'tools/requirements.txt'
      - '.github/workflows/build-converter.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: |
          pyinstaller --onefile --noconsole --name "Serenade Music Converter" tools/midi2ahk.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Serenade-Music-Converter-Windows
          path: dist/Serenade Music Converter.exe

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxkbcommon0 libgl1 libegl1 fuse

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: |
          pyinstaller --onefile --noconsole --name "Serenade Music Converter" tools/midi2ahk.py
          cp "dist/Serenade Music Converter" tools/AppDir/usr/bin/serenade-midi-converter

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run tools/AppDir Serenade_Music_Converter-x86_64.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Serenade-Music-Converter-Linux
          path: Serenade_Music_Converter-x86_64.AppImage
