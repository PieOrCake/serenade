name: Build Music Converter

on:
  push:
    paths:
      - 'tools/midi2ahk.py'
      - 'tools/requirements.txt'
      - '.github/workflows/build-converter.yml'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements.txt
          pip install pyinstaller

      - name: Build Windows exe
        run: |
          pyinstaller --onefile --noconsole --name "Serenade Music Converter" tools/midi2ahk.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Serenade-Music-Converter-Windows
          path: dist/Serenade Music Converter.exe
